version: '3.8'

services:
  mariadb-opex:
    image: mariadb:latest
    container_name: mariadb-opex-db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: opex_fpa_db
      MARIADB_USER: opex_user
      MARIADB_PASSWORD: opexpassword
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
