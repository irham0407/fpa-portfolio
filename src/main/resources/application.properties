# ==========================================
# Application Configuration
# ==========================================
spring.application.name=fpa-portfolio
server.port=8080

# ===================================
# Disable Spring Security (Cara 3: Opsi Testing tanpa Login)
# ===================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ==========================================
# Database Configuration (Lokal Non-Docker)
# ==========================================
# Database otomatis dibuat jika belum ada di MariaDB/MySQL lokal
spring.datasource.url=jdbc:mariadb://localhost:3306/fpa_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&authenticationPlugins=org.mariadb.jdbc.plugin.authentication.standard.NativePasswordPlugin
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Logging SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# Spring Security Configuration
# ===================================
#spring.security.user.name=admin
#spring.security.user.password=admin123

# ==========================================
# Additional Configurations
# ==========================================
spring.jackson.time-zone=Asia/Jakarta